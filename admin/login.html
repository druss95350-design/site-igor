<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Corse Pro Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f4f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .login-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 40px;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 8px;
      font-family: 'Playfair Display', serif;
    }
    .login-desc {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      background: #fff;
      border: 2px solid #e2e2e0;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #1c1c1e;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .btn-google:hover {
      border-color: #aaa;
      box-shadow: 0 4px 16px rgba(0,0,0,0.09);
      transform: translateY(-1px);
    }
    .btn-google svg { flex-shrink: 0; }

    .error-banner {
      display: none;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.88rem;
      margin-bottom: 24px;
      text-align: left;
    }
    .error-banner.visible { display: block; }

    .login-footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #9ca3af;
    }
    .login-footer a {
      color: #6b7280;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-brand">Corse Pro Services</div>
    <div class="login-subtitle">Interface d'administration</div>

    <div class="error-banner" id="errorBanner">
      ⛔ Accès refusé. Ce compte Google n'est pas autorisé.
    </div>

    <h1 class="login-title">Se connecter</h1>
    <p class="login-desc">
      Utilisez votre compte Google autorisé pour accéder
      à l'interface de gestion des réalisations.
    </p>

    <a href="/api/auth/google" class="btn-google">
      <!-- Icône Google officielle -->
      <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20c0-1.3-.1-2.5-.4-3.5z"/>
        <path fill="#34A853" d="M6.3 14.7l6.6 4.8C14.6 15.7 19 12 24 12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
        <path fill="#FBBC05" d="M24 44c5.2 0 10-1.7 13.7-4.7l-6.3-5.2C29.5 35.6 26.9 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.3C9.5 35.7 16.2 44 24 44z"/>
        <path fill="#EA4335" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.3 5.2C37.1 39.8 44 34.6 44 24c0-1.3-.1-2.5-.4-3.5z"/>
      </svg>
      Se connecter avec Google
    </a>

    <div class="login-footer">
      <a href="/">← Retour au site</a>
    </div>
  </div>

  <script>
    // Afficher le message d'erreur si présent dans l'URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('erreur') === 'non_autorise') {
      document.getElementById('errorBanner').classList.add('visible');
    }
  </script>

</body>
</html>
